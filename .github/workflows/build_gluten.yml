name: Build bundle package

on:
  push:
    branches:
      - 'ebay-build'
  workflow_dispatch:
    inputs:
      spark:
        description: 'Spark version: spark-3.2, spark-3.3, spark-3.4 or spark-3.5'
        required: true
        default: 'spark-3.5'
      hadoop:
        description: 'Hadoop version: 2.7.4, 3.2.0, 3.2.2, 3.3.1, 3.3.3 or 3.3.6'
        required: true
        default: '3.3.3'

jobs:
  build-native-lib:
    runs-on: ubuntu-20.04
    container: apache/gluten:vcpkg-centos-7
    steps:
      - name: Install packages
        run: |
          git clone https://wangyum:${{ secrets.GITHUB_TOKEN }}@github.com/wangyum/packages.git
          mkdir -p /root/.m2/repository/ && rm -rf /root/.m2/repository/io && rm -rf /root/.m2/repository/org && mv packages/* /root/.m2/repository/
      - name: Build Spark
        run: |
          git clone -b gluten-build https://wangyum:${{ secrets.GITHUB_TOKEN }}@github.com/wangyum/ebay-spark.git
          cd ebay-spark && mvn clean install -DskipTests=true
      - name: Build Gluten velox third party
        run: |
          git clone -b ebay-build https://github.com/wangyum/incubator-gluten.git
          cd incubator-gluten
          bash dev/ci-velox-buildstatic-centos-7.sh
          ls -lh ./cpp/build/releases/
          ls -lhR /root/.m2/repository/org/apache/arrow/
          mvn clean install -Pspark-3.5 -Dhadoop.version=3.3.3 -Pbackends-velox -Pceleborn -Puniffle -DskipTests -Dmaven.source.skip
          ls -lh package/target/
      - name: Upload bundle package
        uses: actions/upload-artifact@v3
        with:
          name: gluten-velox-bundle-package
          path: package/target/gluten-velox-bundle-*.jar
          retention-days: 7
